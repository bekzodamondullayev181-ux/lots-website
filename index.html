<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lots List Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      padding: 20px;
      color: #222;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    th {
      background: #111827;
      color: white;
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    tr:hover {
      background: #f9fafb;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
    }

    .stats {
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 768px) {
      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <h1>Lots List Dashboard</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by lot name or ID..." />

    <select id="mchjFilter">
      <option value="all">All MCHJ</option>
    </select>
  </div>

  <div class="stats" id="stats"></div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>MCHJ</th>
        <th>Lot Name</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    // Excel data converted into JSON
    const lots = [
      {
        id: 22838282,
        mchj: "Dimagi",
        name: "Buxoro viloyati, G'ijduvon tumani, Baraka MFY, lot 1",
        date: "07.05.2026"
      },
      {
        id: 22838281,
        mchj: "Dimagi",
        name: "Buxoro viloyati, G'ijduvon tumani, Baraka MFY, lot 2",
        date: "07.05.2026"
      },
      {
        id: 22838275,
        mchj: "Dimagi",
        name: "Buxoro viloyati, G'ijduvon tumani, Baraka MFY, lot 3",
        date: "07.05.2026"
      },
      {
        id: 22838274,
        mchj: "Dimagi",
        name: "Buxoro viloyati, G'ijduvon tumani, Baraka MFY, lot 4",
        date: "07.05.2026"
      },
      {
        id: 22838273,
        mchj: "Dimagi",
        name: "Buxoro viloyati, G'ijduvon tumani, Baraka MFY, lot 5",
        date: "07.05.2026"
      },
      {
        id: 22838272,
        mchj: "Omad",
        name: "Sample lot data 1",
        date: "07.05.2026"
      },
      {
        id: 22838271,
        mchj: "Omad",
        name: "Sample lot data 2",
        date: "07.05.2026"
      },
      {
        id: 22838270,
        mchj: "Sandooq",
        name: "Sample lot data 3",
        date: "07.05.2026"
      }
    ];

    const tableBody = document.getElementById("tableBody");
    const searchInput = document.getElementById("searchInput");
    const mchjFilter = document.getElementById("mchjFilter");
    const stats = document.getElementById("stats");

    // Populate filter dropdown
    const uniqueMCHJ = [...new Set(lots.map(lot => lot.mchj))];

    uniqueMCHJ.forEach(name => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      mchjFilter.appendChild(option);
    });

    function renderTable(data) {
      tableBody.innerHTML = "";

      data.forEach(lot => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${lot.id}</td>
          <td><span class="badge">${lot.mchj}</span></td>
          <td>${lot.name}</td>
          <td>${lot.date}</td>
        `;

        tableBody.appendChild(row);
      });

      stats.textContent = `Showing ${data.length} lots`;
    }

    function filterData() {
      const search = searchInput.value.toLowerCase();
      const mchj = mchjFilter.value;

      const filtered = lots.filter(lot => {
        const matchesSearch =
          lot.name.toLowerCase().includes(search) ||
          String(lot.id).includes(search);

        const matchesMCHJ = mchj === "all" || lot.mchj === mchj;

        return matchesSearch && matchesMCHJ;
      });

      renderTable(filtered);
    }

    searchInput.addEventListener("input", filterData);
    mchjFilter.addEventListener("change", filterData);

    renderTable(lots);
  </script>
</body>
</html>
